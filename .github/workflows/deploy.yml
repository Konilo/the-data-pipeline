# source: https://docs.astro.build/en/guides/deploy/github/


name: Deploy to GitHub Pages

on:
  # Trigger the workflow on every push to the `main` branch
  push:
    branches: [ main ]
  # Allows this workflow to be triggered manually
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./the-data-pipeline
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./the-data-pipeline/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium for mermaid
        run: npx playwright install --with-deps chromium
      - name: Build Astro site
        run: npx astro build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./the-data-pipeline/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
